name: Hourly Surf Update

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

concurrency:
  group: hourly-surf-update
  cancel-in-progress: false

jobs:
  trigger-update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger production update API
        env:
          WAVES_CRON_SECRET: ${{ secrets.WAVES_CRON_SECRET }}
          WAVES_CRON_URL: ${{ secrets.WAVES_CRON_URL }}
        run: |
          set -euo pipefail

          CRON_URL="${WAVES_CRON_URL:-https://waves-three-theta.vercel.app/api/cron/update}"

          if [ -z "${WAVES_CRON_SECRET:-}" ]; then
            echo "Missing GitHub secret: WAVES_CRON_SECRET"
            exit 1
          fi

          response_file="$(mktemp)"
          http_status=$(curl -sS -o "$response_file" -w "%{http_code}" \
            -H "Authorization: Bearer ${WAVES_CRON_SECRET}" \
            "$CRON_URL")

          cat "$response_file"
          echo

          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "Update request failed with HTTP status: $http_status"
            exit 1
          fi

          node -e '
          const fs = require("node:fs");
          const path = process.argv[1];
          const data = JSON.parse(fs.readFileSync(path, "utf8"));
          const results = Array.isArray(data.results) ? data.results : [];
          const successCount = results.filter((row) => row && row.ok).length;
          const failed = results.filter((row) => row && !row.ok);

          if (results.length === 0) {
            console.error("Update response has no results");
            process.exit(1);
          }

          if (successCount === 0) {
            console.error("All spots failed");
            process.exit(1);
          }

          if (failed.length > 0) {
            console.warn(
              "Partial failure:",
              failed.map((row) => `${row.spotId}:${row.message}`).join(", ")
            );
          }
          ' "$response_file"

          echo "Hourly update succeeded."
